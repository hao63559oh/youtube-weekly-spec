name: weekly

# トリガーは schedule と workflow_dispatch のみ（pull_request / pull_request_target は使わない。10.3）。
on:
  schedule:
    # 毎週土曜 15:00 UTC = 日曜 00:00 JST。
    # ISO週は月〜日なので、土曜(UTC)と日曜(JST)は同一週に収まりラベルがズレない。
    # 00:00 UTC は cron が最も集中して遅延しやすいため、この枠を避ける意図もある。
    - cron: '0 15 * * 6'
  workflow_dispatch:
    inputs:
      now:
        description: '基準時刻 ISO8601（空なら現在時刻。例: 2026-07-18T15:00:00Z）'
        required: false
        type: string

# 付与は contents: write のみ（10.3）。
permissions:
  contents: write

# 同時実行を避ける（前回の生成と衝突させない）。
concurrency:
  group: weekly
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      # すべての外部 action を SHA 固定（可動タグ禁止。10.3）。
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        # バージョン固定済み requirements.txt。ハッシュ固定 lock を使う場合は
        # `pip install --require-hashes -r requirements.lock` に置き換える（README 参照）。
        run: pip install -r requirements.txt

      # 壊れた状態での自動コミットを防ぐテストゲート（11.3）。
      - name: Unit tests (gate)
        run: python -m unittest discover -s tests

      - name: Fetch weekly data
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # inputs.now は run 内に直接展開せず env 経由で渡す（シェルへの注入を避ける）。
          # schedule 実行時は空文字になり、fetch.py 側の既定（現在UTC）が使われる。
          NOW: ${{ inputs.now }}
        run: |
          if [ -n "$NOW" ]; then
            python scripts/fetch.py --now "$NOW"
          else
            python scripts/fetch.py
          fi

      # 自動コミットは対象を明示（想定外ファイルを巻き込まない。10.3）。差分が無ければスキップ。
      - name: Commit & push docs/data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --staged --quiet; then
            echo "差分なし: コミットしません"
          else
            git commit -m "data: 週次データ更新 [skip ci]"
            git push
          fi
